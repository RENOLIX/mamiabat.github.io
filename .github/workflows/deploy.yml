name: Deploy WHTL

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://nrifrzycijiexgrutgam.supabase.co
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
      - name: Add route fallbacks
        run: |
          cp dist/index.html dist/404.html
          routes=(
            how-we-help
            case-studies
            equipment
            resources
            about
            contact
            news
            admin
            admin/news
            admin/users
            services/freight-forwarding
            services/ship-agency
            services/special-transport
            services/heavy-lift
            equipment/thp-sl
            equipment/extendable-trailers
            equipment/tramway-trailers
            equipment/conventional-trailers
            equipment/transport-accessories
            equipment/skidding
            equipment/sbl-gantries
            equipment/hydraulic-equipment
            equipment/heavy-haul-tractors
          )
          for route in "${routes[@]}"; do
            mkdir -p "dist/$route"
            cp dist/index.html "dist/$route/index.html"
          done
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
